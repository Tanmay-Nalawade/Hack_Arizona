<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hack Arizona</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/navbar.js"></script>
  </head>
  <body>
    <header class="nav" role="navigation" aria-label="Top navigation">
      <div class="nav__left">
        <a class="nav__logo" href="/" aria-label="Home">
          <img src="/images/Logo.png" alt="Hack Arizona" class="nav__logoImg" />
        </a>

        <div class="nav__streaks" aria-label="Streaks">
          <span class="nav__fire" id="fireIcon" aria-hidden="true" title="Streaks">
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M12 22c-4.418 0-8-3.582-8-8 0-3.184 1.632-5.25 3.23-6.86.85-.856 1.58-1.59 1.92-2.33.57-1.243.49-2.4.41-3.31 2.42 1.06 4.1 2.78 4.9 4.48.45.96.6 2.02.44 3.18 1.16-.55 2.18-1.64 2.9-3.28 2.35 2.24 4.2 4.74 4.2 8.12 0 4.418-3.582 8-8 8Z"
                class="nav__firePath"
              />
            </svg>
          </span>
          <span class="nav__streakText">
            <span class="nav__streakLabel">Streaks</span>
            <span class="nav__streakCount" id="streakCount" data-streaks="0">0</span>
          </span>
        </div>

        <nav class="nav__links" aria-label="Sections">
          <a class="nav__link" href="/coursework">Coursework</a>
        </nav>
      </div>

      <div class="nav__right">
        <a class="nav__profile" href="/profile" aria-label="Profile">
          <span class="nav__profileIcon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              width="20"
              height="20"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.505 4.505 0 0 0 12 12Zm0 2.25c-4.47 0-8.1 2.52-8.1 5.625 0 .621.504 1.125 1.125 1.125h13.95c.621 0 1.125-.504 1.125-1.125C20.1 16.77 16.47 14.25 12 14.25Z"
                class="nav__profilePath"
              />
            </svg>
          </span>
          <span class="nav__profileText">Profile</span>
        </a>
      </div>
    </header>

    <main class="page">
      <h1 class="page__title">Home</h1>
      <p class="page__hint">
        Demo: set streaks in the console with
        <code>setStreaks(3)</code>.
      </p>
    </main>
  </body>
</html>
