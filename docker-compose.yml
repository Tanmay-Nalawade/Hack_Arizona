services:
  mongo:
    image: mongo:7
    container_name: hackaz-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hackaz-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/hackaz
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hackaz-client
    restart: unless-stopped
    env_file:
      - ./client/.env
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  mongo_data:

